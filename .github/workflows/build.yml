name: Linux/Mac build

on:
  push:
    paths:
      - '**'
      - '!*'
      - '*.py'
      - '!doc/**'
      - '!.github/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths-ignore:
      - 'doc/**'
  schedule:
    - cron: '0 20 * * 2'
  # Manual trigger: lets us run the all-backend job on demand and (optionally)
  # regenerate the backend xfail-ledger from a real run (regen=true wires
  # GALPY_BACKEND_XFAIL_REGEN=1 into the backend job; see the backend-suite job).
  workflow_dispatch:
    inputs:
      regen:
        description: 'Regenerate the backend xfail-ledger (writes backend_xfail_new.txt as an artifact instead of xfailing)'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_actionAngle.py
            REQUIRES_PYNBODY: false
            REQUIRES_ASTROPY: false
            REQUIRES_ASTROQUERY: false
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_sphericaldf.py
            REQUIRES_PYNBODY: false
            REQUIRES_ASTROPY: false
            REQUIRES_ASTROQUERY: false
            REQUIRES_NUMBA: false
            REQUIRES_JAX: true
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_backend*.py
            REQUIRES_PYNBODY: false
            REQUIRES_ASTROPY: false
            REQUIRES_ASTROQUERY: false
            REQUIRES_NUMBA: false
            REQUIRES_JAX: true
            REQUIRES_TORCH: true
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_actionAngleTorus.py tests/test_conversion.py tests/test_galpypaper.py tests/test_import.py tests/test_interp_potential.py tests/test_kuzminkutuzov.py  tests/test_util.py
            REQUIRES_PYNBODY: false
            REQUIRES_ASTROPY: false
            REQUIRES_ASTROQUERY: false
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_SpiralArmsPotential.py tests/test_potential.py tests/test_scf.py tests/test_MultipoleExpansionPotential.py tests/test_snapshotpotential.py
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: false
            REQUIRES_ASTROQUERY: false
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_quantity.py tests/test_coords.py
            REQUIRES_PYNBODY: false
            # needs to be separate for different config
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: false
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_orbit.py -k 'test_energy_jacobi_conservation or from_name'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_orbit.py tests/test_orbits.py -k 'not test_energy_jacobi_conservation'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_evolveddiskdf.py
            REQUIRES_PYNBODY: false
            REQUIRES_ASTROPY: false
            REQUIRES_ASTROQUERY: false
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_jeans.py tests/test_dynamfric.py tests/test_FDMdynamfric.py
            REQUIRES_PYNBODY: false
            REQUIRES_ASTROPY: false
            REQUIRES_ASTROQUERY: false
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_qdf.py tests/test_pv2qdf.py tests/test_streamgapdf_impulse.py tests/test_noninertial.py
            REQUIRES_PYNBODY: false
            REQUIRES_ASTROPY: false
            REQUIRES_ASTROQUERY: false
            REQUIRES_NUMBA: true
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_streamgapdf.py
            REQUIRES_PYNBODY: false
            REQUIRES_ASTROPY: false
            REQUIRES_ASTROQUERY: false
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_diskdf.py
            REQUIRES_PYNBODY: false
            REQUIRES_ASTROPY: false
            REQUIRES_ASTROQUERY: false
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.14"
            TEST_FILES: tests/test_streamdf.py tests/test_streamspraydf.py tests/test_streamTrack.py
            REQUIRES_PYNBODY: false
            REQUIRES_ASTROPY: false
            REQUIRES_ASTROQUERY: false
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.13"
            TEST_FILES: tests/test_orbit.py -k 'test_energy_jacobi_conservation or from_name'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.13"
            TEST_FILES: tests/test_orbit.py tests/test_orbits.py -k 'not test_energy_jacobi_conservation'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.12"
            TEST_FILES: tests/test_orbit.py -k 'test_energy_jacobi_conservation or from_name'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.12"
            TEST_FILES: tests/test_orbit.py tests/test_orbits.py -k 'not test_energy_jacobi_conservation'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.11"
            TEST_FILES: tests/test_orbit.py -k 'test_energy_jacobi_conservation or from_name'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.11"
            TEST_FILES: tests/test_orbit.py tests/test_orbits.py -k 'not test_energy_jacobi_conservation'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.10"
            TEST_FILES: tests/test_orbit.py -k 'test_energy_jacobi_conservation or from_name'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: ubuntu-latest
            python-version: "3.10"
            TEST_FILES: tests/test_orbit.py tests/test_orbits.py -k 'not test_energy_jacobi_conservation'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: macos-15
            python-version: "3.14"
            TEST_FILES: tests/test_orbit.py -k 'test_energy_jacobi_conservation or from_name'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: macos-15
            python-version: "3.14"
            TEST_FILES: tests/test_orbit.py tests/test_orbits.py -k 'not test_energy_jacobi_conservation'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: macos-15-intel
            python-version: "3.14"
            TEST_FILES: tests/test_orbit.py -k 'test_energy_jacobi_conservation or from_name'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
          - os: macos-15-intel
            python-version: "3.14"
            TEST_FILES: tests/test_orbit.py tests/test_orbits.py -k 'not test_energy_jacobi_conservation'
            REQUIRES_PYNBODY: true
            REQUIRES_ASTROPY: true
            REQUIRES_ASTROQUERY: true
            REQUIRES_NUMBA: false
            REQUIRES_JAX: false
    env:
      PYTHON_COVREPORTS_VERSION: "3.14"
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install lcov
      if: matrix.os == 'ubuntu-latest'
      run: |
         wget https://github.com/linux-test-project/lcov/releases/download/v1.15/lcov-1.15.tar.gz
         tar xf lcov-1.15.tar.gz
         sudo make -C lcov-1.15/ install
    - name: Install the GSL
      if: matrix.os == 'ubuntu-latest'
      run: |
         sudo apt-get install libgsl-dev
    - name: Install the GSL and OpenMP
      if: ${{ contains(matrix.os, 'macos') }}
      run: |
         brew install gsl libomp
         brew info libomp
         # We don't setup the GSL env variables here, because they are auto-added by setup.py
         echo "CFLAGS=-I$(brew --prefix)/opt/libomp/include" >> $GITHUB_ENV
         echo "CPPFLAGS=-I$(brew --prefix)/opt/libomp/include" >> $GITHUB_ENV
         echo "LDFLAGS=-L$(brew --prefix)/opt/libomp/lib" >> $GITHUB_ENV
         echo "LD_LIBRARY_PATH=$(brew --prefix)/opt/libomp/lib" >> $GITHUB_ENV
         echo "DYLD_LIBRARY_PATH=$(brew --prefix)/opt/libomp/lib" >> $GITHUB_ENV
    - uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('.github/workflows/build.yml') }}-${{ matrix.REQUIRES_PYNBODY }}-${{ matrix.REQUIRES_ASTROPY }}-${{ matrix.REQUIRES_ASTROQUERY }}-${{ matrix.REQUIRES_NUMBA }}-${{ matrix.REQUIRES_JAX }}
    - name: Install Python dependencies
      run: |
         pip install --upgrade --upgrade-strategy eager numpy scipy matplotlib numexpr setuptools cython tqdm
    - name: Install pynbody
      if: ${{ matrix.REQUIRES_PYNBODY }}
      run: |
         pip install --upgrade --upgrade-strategy eager h5py pandas pytz
         pip install --upgrade --upgrade-strategy eager wheel
         CC=gcc-12 CXX=g++-12 pip install --upgrade --upgrade-strategy eager pynbody
    - name: Install astropy
      if: ${{ matrix.REQUIRES_ASTROPY }}
      run: pip install astropy pyerfa
    - name: Install astroquery (latest release)
      if: ${{ matrix.REQUIRES_ASTROQUERY && contains(matrix.TEST_FILES,'test_energy_jacobi_conservation or from_name') }}
      run: pip install astroquery
    - name: Install astroquery (bleeding edge)
      if: ${{ matrix.REQUIRES_ASTROQUERY && contains(matrix.TEST_FILES,'not test_energy_jacobi_conservation') }}
      run: pip install --pre astroquery
    - name: Install numba
      if: ${{ matrix.REQUIRES_NUMBA }}
      run: |
        pip install numba
        # numba may force install an older version of setuptools,
        # but it isn't actually a *runtime* requirement numba/numba#8366
        pip install --upgrade --force-reinstall setuptools
    - name: Install JAX
      if: ${{ matrix.REQUIRES_JAX }}
      # diffrax: backend ODE integrator (jax) used by the test_backend_inbackend_ode
      # tests, so galpy.backend._reference/_jax is exercised and covered.
      run: pip install jax jaxlib array-api-compat diffrax
    - name: Install PyTorch (CPU)
      if: ${{ matrix.REQUIRES_TORCH }}
      run: |
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install torchdiffeq  # backend ODE integrator (torch); covers galpy.backend._torch
    - name: Install torus code
      env:
          TEST_FILES: ${{ matrix.TEST_FILES }}
      run: |
         if [[ $TEST_FILES != 'tests/test_evolveddiskdf.py' ]]; then
           git clone https://github.com/jobovy/Torus.git galpy/actionAngle/actionAngleTorus_c_ext/torus
           cd galpy/actionAngle/actionAngleTorus_c_ext/torus
           git checkout galpy
           cd -
         fi
    - name: Install package
      if: ${{ contains(matrix.os, 'ubuntu') }}
      env:
        GALPY_COMPILE_NO_OPENMP: 1
        GALPY_COMPILE_COVERAGE: 1
        GALPY_COMPILE_SINGLE_EXT: 1
      run: |
        python -m pip install --no-build-isolation -ve ".[test]"
        python setup.py build_ext --inplace
    - name: Install package
      if: ${{ contains(matrix.os, 'macos') }}
      run: |
        python -m pip install -v ".[test]"
    - name: Special config
      env:
          TEST_FILES: ${{ matrix.TEST_FILES }}
      run: |
        if [[ $TEST_FILES == 'tests/test_evolveddiskdf.py' ]]; then echo -e '[normalization]' > $HOME/.galpyrc && echo -e 'ro = 8.' >> $HOME/.galpyrc && echo -e 'vo = 220.' >> $HOME/.galpyrc; fi
        if [[ $TEST_FILES == 'tests/test_diskdf.py' ]]; then echo -e '[normalization]' > $HOME/.galpyrc && echo -e 'ro = 8.' >> $HOME/.galpyrc && echo -e '[astropy]' >> $HOME/.galpyrc && echo -e 'astropy-units = False' >> $HOME/.galpyrc && echo -e '[plot]' >> $HOME/.galpyrc && echo -e 'seaborn-bovy-defaults = True' >> $HOME/.galpyrc && echo -e '[warnings]' >> $HOME/.galpyrc && echo -e 'verbose = True' >> $HOME/.galpyrc; fi
    - name: Print debug info
      env:
         REQUIRES_ASTROPY : ${{ matrix.REQUIRES_ASTROPY }}
         REQUIRES_ASTROQUERY : ${{ matrix.REQUIRES_ASTROQUERY }}
         REQUIRES_PYNBODY : ${{ matrix.REQUIRES_PYNBODY }}
      run: |
         python -c "import numpy; print('numpy: {}'.format(numpy.__version__))"
         python -c "import scipy; print('scipy: {}'.format(scipy.__version__))"
         python -c "import matplotlib; print('matplotlib: {}'.format(matplotlib.__version__))"
         if $REQUIRES_ASTROPY; then python -c "import astropy; print('astropy: {}'.format(astropy.__version__))"; fi
         if $REQUIRES_ASTROQUERY; then python -c "import astroquery; print('astroquery: {}'.format(astroquery.__version__))"; fi
         if $REQUIRES_PYNBODY; then python -c "import pynbody; print('pynbody: {}'.format(pynbody.__version__))"; fi
    - name: Test with pytest
      env:
          TEST_FILES: ${{ matrix.TEST_FILES }}
          REQUIRES_ASTROPY : ${{ matrix.REQUIRES_ASTROPY }}
          MPLBACKEND: Agg
      run: |
        # Turn astropy deprecation warnings into errors as well if astropy
        if $REQUIRES_ASTROPY; then export PYTEST_ADDOPTS="-W error::astropy.utils.exceptions.AstropyDeprecationWarning"; else export PYTEST_ADDOPTS=""; fi
        # eval necessary for -k 'not ...' in TEST_FILES
        eval "pytest -W error::DeprecationWarning -W error::FutureWarning $PYTEST_ADDOPTS -v $TEST_FILES --cov galpy --cov-config .coveragerc --disable-pytest-warnings --durations=0 --cov-report=term --cov-report=xml"
    - name: Generate code coverage
      if: ${{ matrix.python-version == env.PYTHON_COVREPORTS_VERSION && matrix.os == 'ubuntu-latest' }}
      run: |
        lcov --capture --base-directory . --directory build/temp.linux-x86_64-`python -c "import sys; print(sys.implementation.cache_tag)"`/galpy/ --no-external --output-file coverage.info
    - name: Upload coverage reports to codecov
      if: ${{ matrix.python-version == env.PYTHON_COVREPORTS_VERSION && matrix.os == 'ubuntu-latest' }}
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================================================
  # All-backend existing-suite job (Pillar 1).
  #
  # Runs the EXISTING heavy test files (same TEST_FILES sharding as the numpy
  # `build` job above) under --backend=jax and --backend=torch, CPU-only, and
  # keeps the run GREEN via the checked-in xfail-ledger (tests/backend_xfail.txt
  # + the pytest_collection_modifyitems hook in tests/conftest.py). strict=True
  # xfail means a now-passing ledgered test XPASSes and FAILS the run, so the
  # ledger can only shrink (a burndown). This is the slow, "frequent but cheap"
  # job, so it is GATED to run ONLY:
  #   * on pushes to the feat/backends integration branch,
  #   * on the weekly schedule (cron), or
  #   * on a manual workflow_dispatch.
  # It NEVER runs on ordinary PRs / pushes (keeping per-PR CI fast). The per-PR
  # numpy matrix and the existing test_backend*.py jax/torch job are untouched.
  backend-suite:
    name: backend ${{ matrix.BACKEND }} ${{ matrix.TEST_FILES }}
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/feat/backends'
      || github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        BACKEND: [jax, torch]
        # Mirror the heavy shards of the numpy `build` matrix. test_df.py does
        # not exist in this tree; the df coverage is test_sphericaldf.py +
        # test_diskdf.py + test_qdf.py (the other df_* files), included below.
        TEST_FILES:
          - tests/test_potential.py
          - tests/test_orbit.py
          - tests/test_actionAngle.py
          - tests/test_sphericaldf.py tests/test_diskdf.py tests/test_qdf.py
    env:
      MPLBACKEND: Agg
      # CPU-only for both backends on the CI runner.
      JAX_PLATFORMS: cpu
      CUDA_VISIBLE_DEVICES: ""
      # Wire the workflow_dispatch regen toggle into the ledger hook.
      GALPY_BACKEND_XFAIL_REGEN: ${{ (github.event_name == 'workflow_dispatch' && inputs.regen) && '1' || '0' }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        allow-prereleases: true
    - name: Install the GSL
      run: sudo apt-get install libgsl-dev
    - name: Install Python dependencies
      run: pip install --upgrade --upgrade-strategy eager numpy scipy matplotlib numexpr setuptools cython tqdm
    - name: Install JAX
      if: ${{ matrix.BACKEND == 'jax' }}
      run: pip install jax jaxlib array-api-compat diffrax
    - name: Install PyTorch (CPU)
      if: ${{ matrix.BACKEND == 'torch' }}
      run: |
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install array-api-compat torchdiffeq
    - name: Install torus code
      run: |
        git clone https://github.com/jobovy/Torus.git galpy/actionAngle/actionAngleTorus_c_ext/torus
        cd galpy/actionAngle/actionAngleTorus_c_ext/torus
        git checkout galpy
        cd -
    - name: Install package
      env:
        GALPY_COMPILE_NO_OPENMP: 1
        GALPY_COMPILE_SINGLE_EXT: 1
      run: |
        python -m pip install --no-build-isolation -ve ".[test]"
        python setup.py build_ext --inplace
    - name: Test with pytest (backend=${{ matrix.BACKEND }})
      env:
        TEST_FILES: ${{ matrix.TEST_FILES }}
        BACKEND: ${{ matrix.BACKEND }}
      run: |
        # -rX reports XPASS, -rx reports XFAIL; junit xml drives the burndown.
        # Do NOT pass -W error here: under a backend the existing suite emits
        # many benign warnings that are not part of the ledger contract.
        # `|| true` so a non-zero exit (e.g. a strict XPASS forcing a ledger
        # shrink) still reaches the burndown summary step; the explicit gate in
        # the summary step re-fails the job when appropriate.
        set -o pipefail
        eval "pytest -p no:cacheprovider -v $TEST_FILES \
          --backend=$BACKEND \
          -rxX --junitxml=backend-junit.xml \
          --disable-pytest-warnings" | tee backend-pytest.log || true
    - name: Backend burndown summary
      if: ${{ always() }}
      env:
        BACKEND: ${{ matrix.BACKEND }}
      run: |
        python - "$BACKEND" backend-junit.xml <<'PY' >> "$GITHUB_STEP_SUMMARY"
        import sys, xml.etree.ElementTree as ET
        backend, path = sys.argv[1], sys.argv[2]
        passed = xfailed = xpassed = failed = errored = skipped = total = 0
        try:
            root = ET.parse(path).getroot()
        except Exception as e:
            print(f"Backend {backend}: could not parse junit xml ({e})")
            sys.exit(0)
        for tc in root.iter("testcase"):
            total += 1
            children = list(tc)
            tags = {c.tag for c in children}
            if "error" in tags:
                errored += 1
                continue
            if "failure" in tags:
                failed += 1
                continue
            skip = tc.find("skipped")
            if skip is not None:
                # pytest encodes xfail/xpass via the skipped/<properties>;
                # use the message to disambiguate.
                msg = (skip.get("message") or "") + (skip.text or "")
                if "xfail" in msg.lower():
                    xfailed += 1
                else:
                    skipped += 1
                continue
            passed += 1
        # XPASS(strict) shows up as a failure with an xpass message; recount.
        xpassed = 0
        for tc in root.iter("testcase"):
            fail = tc.find("failure")
            if fail is not None:
                msg = (fail.get("message") or "") + (fail.text or "")
                if "xpass" in msg.lower():
                    xpassed += 1
                    failed -= 1  # was counted as failed above
        line = (f"Backend {backend}: {passed} passed, {xfailed} xfail (ledger), "
                f"{xpassed} XPASS(fix-me)")
        if failed or errored:
            line += f", {failed} FAILED, {errored} ERROR (NOT in ledger)"
        print(line)
        PY
        cat "$GITHUB_STEP_SUMMARY"
    - name: Re-fail on un-ledgered failures or strict XPASS
      if: ${{ always() && env.GALPY_BACKEND_XFAIL_REGEN != '1' }}
      run: |
        # The pytest step swallowed its exit code so the summary always renders.
        # Re-derive pass/fail from junit: any <failure> or <error> (which now
        # includes strict-XPASS ledger entries that must be removed) fails the job.
        python - backend-junit.xml <<'PY'
        import sys, xml.etree.ElementTree as ET
        root = ET.parse("backend-junit.xml").getroot()
        bad = 0
        for tc in root.iter("testcase"):
            if tc.find("failure") is not None or tc.find("error") is not None:
                bad += 1
        if bad:
            print(f"{bad} non-xfail failures/errors (incl. strict XPASS); see log.")
            sys.exit(1)
        print("All green: every failure is covered by the xfail-ledger.")
        PY
    - name: Upload regenerated ledger (regen mode)
      if: ${{ always() && env.GALPY_BACKEND_XFAIL_REGEN == '1' }}
      uses: actions/upload-artifact@v4
      with:
        name: backend-xfail-new-${{ matrix.BACKEND }}-${{ strategy.job-index }}
        path: /var/tmp/pillar1/backend_xfail_new.txt
        if-no-files-found: warn

  # ===========================================================================
  # Per-PR backend smoke (Pillar 1, fast gross-regression catch).
  #
  # Runs a tiny curated slice (~10 potential-consistency + a few orbit-energy +
  # an actionAngle Staeckel case) under BOTH backends on EVERY PR/push, ~3 min.
  # This is deliberately separate from (and far smaller than) the heavy
  # backend-suite job above, and does NOT touch the existing test_backend*.py
  # job, so per-PR CI is not meaningfully slowed. The ledger is NOT applied
  # here (these curated tests are expected to PASS under both backends); a
  # regression makes the smoke RED immediately.
  backend-smoke:
    name: backend smoke ${{ matrix.BACKEND }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        BACKEND: [jax, torch]
    env:
      MPLBACKEND: Agg
      JAX_PLATFORMS: cpu
      CUDA_VISIBLE_DEVICES: ""
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        allow-prereleases: true
    - name: Install the GSL
      run: sudo apt-get install libgsl-dev
    - name: Install Python dependencies
      run: pip install --upgrade --upgrade-strategy eager numpy scipy matplotlib numexpr setuptools cython tqdm
    - name: Install JAX
      if: ${{ matrix.BACKEND == 'jax' }}
      run: pip install jax jaxlib array-api-compat diffrax
    - name: Install PyTorch (CPU)
      if: ${{ matrix.BACKEND == 'torch' }}
      run: |
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install array-api-compat torchdiffeq
    - name: Install package
      env:
        GALPY_COMPILE_NO_OPENMP: 1
        GALPY_COMPILE_SINGLE_EXT: 1
      run: |
        python -m pip install --no-build-isolation -ve ".[test]"
        python setup.py build_ext --inplace
    - name: Smoke test under backend=${{ matrix.BACKEND }}
      env:
        BACKEND: ${{ matrix.BACKEND }}
      run: |
        # Curated, fast, backend-CLEAN slice (verified GREEN under BOTH jax and
        # torch as of the seed run): ~10 small potential-consistency checks
        # (rforce/r2deriv across the whole potential registry, the
        # planar-force iterator, the Ring/SphericalShell normalizers, and the
        # MovingObject 2nd-deriv FD check) plus an orbit setup/integration case.
        # The ledger is NOT applied here: these are expected to PASS, so any
        # regression makes the smoke RED immediately. ~2-3 min; the broader
        # orbit-energy and actionAngle-Staeckel coverage (which still has many
        # known backend failures, tracked in the xfail-ledger) runs in the
        # gated backend-suite job, not on every PR.
        #
        # NB: this curated -k is deliberately the backend-clean intersection;
        # do NOT add orbit-energy/actionAngle-Staeckel cases here until they are
        # green under both backends (they currently hit the torch scalar-input
        # and jax in-place-mutation clusters).
        # NB: -k applies to ALL selected files, so test_orbit_setup_linear must
        # appear in the -k expression too (otherwise the explicit orbit nodeid
        # is deselected by the potential-only -k).
        pytest -p no:cacheprovider -v --backend=$BACKEND \
          --disable-pytest-warnings \
          tests/test_potential.py tests/test_orbit.py::test_orbit_setup_linear \
            -k "test_rforce or test_r2deriv or test_planarForce_len_iter or test_RingPotential_normalizer0 or test_SphericalShellPotential_normalizer0 or test_MovingObject_2ndderivs_fd or test_orbit_setup_linear"
