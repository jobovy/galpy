name: Validate documentation notebooks

on:
  push:
    paths:
      - '**'
      - '!*'
      - '*.py'
      - '*.c'
      - '*.cpp'
      - '*.h'
      - '!doc/**'
      - 'doc/source/tutorials/**/*.ipynb'
      - '!.github/**'
      - '.github/workflows/notebooks.yml'
  pull_request:
    paths:
      - '**'
      - '!doc/**'
      - 'doc/source/tutorials/**/*.ipynb'

jobs:
  run-notebooks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.10, 3.11, 3.12, 3.13, 3.14]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '${{ matrix.python-version }}'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev
      - name: Clone Torus code for actionAngleTorus
        run: |
          git clone https://github.com/jobovy/Torus.git galpy/actionAngle/actionAngleTorus_c_ext/torus
          cd galpy/actionAngle/actionAngleTorus_c_ext/torus
          git checkout galpy
          cd -
      - name: Install galpy and notebook dependencies
        run: |
          pip install --upgrade pip
          pip install ".[docs]"
          pip install jupyter nbconvert nbformat astropy astroquery numexpr
      - name: Run all tutorial notebooks
        run: |
          set -e
          failed=0
          outdir=$(mktemp -d)
          for nb in $(find doc/source/tutorials -name '*.ipynb' | sort); do
            echo "::group::Running $nb"
            outname=$(basename "$nb")
            if jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=600 \
                --ExecutePreprocessor.kernel_name=python3 --output-dir="$outdir" "$nb"; then
              echo "PASSED: $nb"
            else
              echo "::error::FAILED: $nb"
              failed=1
            fi
            echo "::endgroup::"
          done
          rm -rf "$outdir"
          if [ "$failed" -eq 1 ]; then
            echo "::error::Some notebooks failed execution"
            exit 1
          fi
