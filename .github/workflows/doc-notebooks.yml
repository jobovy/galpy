name: Validate documentation notebooks

on:
  push:
    paths:
      - '**'
      - '!*'
      - '*.py'
      - '*.c'
      - '*.cpp'
      - '*.h'
      - '!doc/**'
      - 'doc/source/tutorials/**/*.ipynb'
      - '!.github/**'
      - '.github/workflows/notebooks.yml'
  pull_request:
    paths:
      - '**'
      - '!doc/**'
      - 'doc/source/tutorials/**/*.ipynb'

jobs:
  run-notebooks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '${{ matrix.python-version }}'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev
      - name: Clone Torus code for actionAngleTorus
        run: |
          git clone https://github.com/jobovy/Torus.git galpy/actionAngle/actionAngleTorus_c_ext/torus
          cd galpy/actionAngle/actionAngleTorus_c_ext/torus
          git checkout galpy
          cd -
      - name: Install galpy and notebook dependencies
        run: |
          pip install --upgrade pip
          pip install ".[docs]"
          pip install jupyter nbconvert nbformat astropy astroquery numexpr pynbody
      - name: Cache pynbody test snapshot
        id: cache-snapshot
        uses: actions/cache@v4
        with:
          path: doc/source/tutorials/potentials/gasoline_ahf
          key: pynbody-g15784-v1
      - name: Download pynbody test snapshot
        if: steps.cache-snapshot.outputs.cache-hit != 'true'
        run: |
          cd doc/source/tutorials/potentials
          curl -L -o gasoline.tar.gz "https://zenodo.org/records/12687409/files/gasoline.tar.gz?download=1"
          tar -xzf gasoline.tar.gz gasoline_ahf/
          rm gasoline.tar.gz
      - name: Run all tutorial notebooks
        run: |
          set -e
          failed=0
          outdir=$(mktemp -d)
          for nb in $(find doc/source/tutorials -name '*.ipynb' | sort); do
            echo "::group::Running $nb"
            outname=$(basename "$nb")
            if jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=600 \
                --ExecutePreprocessor.kernel_name=python3 --output-dir="$outdir" "$nb"; then
              echo "PASSED: $nb"
            else
              echo "::error::FAILED: $nb"
              failed=1
            fi
            echo "::endgroup::"
          done
          rm -rf "$outdir"
          if [ "$failed" -eq 1 ]; then
            echo "::error::Some notebooks failed execution"
            exit 1
          fi
