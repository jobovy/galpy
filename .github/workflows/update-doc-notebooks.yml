name: Update documentation notebooks

on:
  schedule:
    # 06:00 UTC on the 15th of every month — a few hours after test-doc-notebooks.yml's
    # own scheduled monthly run, so its latest-main conclusion is available for
    # the preflight gate below.
    - cron: '0 6 15 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Execute notebooks but do not open a PR (upload results as artifact instead)'
        required: false
        default: false
        type: boolean
  pull_request:
    # Run on PRs that touch this workflow, so changes to the workflow itself can
    # be exercised end-to-end before merge. pull_request events always behave as
    # dry runs: notebooks are executed and uploaded as an artifact; no PR opened.
    paths:
      - '.github/workflows/update-doc-notebooks.yml'

permissions:
  contents: write
  pull-requests: write
  actions: read
  # Required by anthropics/claude-code-action for the OIDC token exchange
  # that validates the OAuth-token auth flow.
  id-token: write

jobs:
  update-notebooks:
    name: >-
      update-notebooks${{
        github.event_name == 'pull_request' && ' (dry run — PR trigger)' ||
        (github.event_name == 'workflow_dispatch' && inputs.dry_run && ' (dry run)') ||
        ''
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify latest main runs of build.yml and test-doc-notebooks.yml passed
        # Fails the workflow (and emails the author of this file) if the most
        # recent completed run of either workflow on the main branch did not
        # succeed, so we don't update notebook outputs from a broken main.
        # Exception: test-doc-notebooks.yml is allowed to have failed if the
        # ONLY notebooks that failed are listed in TOLERATED_FLAKY_NOTEBOOKS —
        # notebooks known to hit transient upstream services (e.g. the Gaia
        # archive returning HTTP 5xx). In that case the update proceeds and
        # those notebooks are restored from HEAD later in the job, with the
        # skip called out in the PR body.
        # Skipped entirely when no PR would be opened anyway (pull_request
        # trigger for testing this workflow, or workflow_dispatch dry_run).
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || !inputs.dry_run)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOLERATED_FLAKY_NOTEBOOKS: |
            doc/source/tutorials/action_angle/staeckel.ipynb
        run: |
          tolerated=$(printf '%s\n' "$TOLERATED_FLAKY_NOTEBOOKS" | sed '/^$/d' | sort -u)
          failed=0
          for wf in build.yml test-doc-notebooks.yml; do
            run=$(gh run list \
              --workflow "$wf" \
              --branch main \
              --status completed \
              --limit 1 \
              --json databaseId,conclusion \
              --jq '.[0]')
            if [ -z "$run" ] || [ "$run" = "null" ]; then
              echo "::error::No completed main-branch run found for $wf"
              failed=1
              continue
            fi
            run_id=$(printf '%s' "$run" | jq -r '.databaseId')
            conclusion=$(printf '%s' "$run" | jq -r '.conclusion')
            if [ "$conclusion" = "success" ]; then
              echo "$wf: latest main run (#$run_id) succeeded"
              continue
            fi
            if [ "$wf" = "test-doc-notebooks.yml" ]; then
              failed_nbs=$(gh run view "$run_id" --log-failed 2>/dev/null \
                | grep -oE 'FAILED: doc/source/tutorials/[^[:space:]]+\.ipynb' \
                | awk '{print $2}' | sort -u)
              untolerated=""
              while IFS= read -r nb; do
                [ -z "$nb" ] && continue
                if ! printf '%s\n' "$tolerated" | grep -qxF "$nb"; then
                  untolerated="${untolerated}${nb}"$'\n'
                fi
              done <<<"$failed_nbs"
              if [ -n "$failed_nbs" ] && [ -z "$untolerated" ]; then
                echo "$wf: latest main run (#$run_id) failed, but only on tolerated flaky notebooks:"
                printf '%s\n' "$failed_nbs" | sed 's/^/  - /'
                echo "  → proceeding; these are known to hit transient upstream services."
                continue
              fi
              echo "::error::Latest completed main run of $wf (#$run_id) ended with conclusion=$conclusion"
              if [ -n "$untolerated" ]; then
                echo "::error::Non-tolerated failed notebooks:"
                printf '%s' "$untolerated" | sed 's/^/  - /'
              fi
            else
              echo "::error::Latest completed main run of $wf (#$run_id) ended with conclusion=$conclusion"
            fi
            failed=1
          done
          exit $failed
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev
          # Verify GSL is discoverable so galpy's C extensions build correctly
          gsl-config --version
          gsl-config --cflags
          gsl-config --libs
      - name: Clone Torus code for actionAngleTorus
        run: |
          git clone https://github.com/jobovy/Torus.git galpy/actionAngle/actionAngleTorus_c_ext/torus
          cd galpy/actionAngle/actionAngleTorus_c_ext/torus
          git checkout galpy
          cd -
      - name: Install galpy and notebook dependencies
        run: |
          pip install --upgrade pip
          # Verbose install so that any GSL/C-extension build issues are visible
          # in CI logs.
          pip install -v ".[docs]"
          pip install jupyter nbconvert nbformat papermill astropy astroquery pyvo numexpr pynbody rebound jax jaxlib
      - name: Uninstall tqdm to keep notebook output clean
        # tqdm is pulled in transitively by some of the optional deps above and
        # its progress bars clutter the rendered notebook outputs.
        run: pip uninstall -y tqdm || true
      - name: Cache pynbody test snapshot
        id: cache-snapshot
        uses: actions/cache@v5
        with:
          path: doc/source/tutorials/potentials/gasoline_ahf
          key: pynbody-g15784-v2
      - name: Download pynbody test snapshot
        if: steps.cache-snapshot.outputs.cache-hit != 'true'
        run: |
          cd doc/source/tutorials/potentials
          curl -L -o gasoline.tar.gz "https://zenodo.org/records/12687409/files/gasoline.tar.gz?download=1"
          tar -xzf gasoline.tar.gz gasoline_ahf/
          rm gasoline.tar.gz
      - name: Restore Gaia DR3 query cache
        # Restore-only: this workflow's scheduled run is 6h after the
        # test-doc-notebooks scheduled run, which is the one that refreshes
        # the cache. We just consume whatever it stored so the staeckel
        # notebook avoids the ESA Gaia archive query (typically ~5 min, but
        # observed up to ~2 h when the archive is degraded).
        uses: actions/cache/restore@v5
        with:
          path: doc/source/tutorials/action_angle/gaia_dr3_solar_neighborhood.fits
          key: gaia-dr3-solar-neighborhood-v1
      - name: Restore Dierickx 2010 thick-disk cache
        # Restore-only: refreshed by test-doc-notebooks's scheduled run. We
        # just consume whatever it stored so the orbit/examples notebook
        # avoids the Vizier query, which has been observed to fail
        # intermittently in CI.
        uses: actions/cache/restore@v5
        with:
          path: doc/source/tutorials/orbits/dierickx_2010_thick_disk.fits
          key: dierickx-2010-thick-disk-v1
      - name: Execute tutorial notebooks in place
        id: execute-notebooks
        # Failures are tolerated: notebooks that error out (e.g. because of
        # transient upstream outages like Gaia archive downtime) are restored
        # from HEAD so their partial/errored state is not committed, and the
        # list is surfaced in the PR body so the merger knows to inspect them.
        run: |
          failed_nbs=()
          for nb in $(find doc/source/tutorials -name '*.ipynb' | sort); do
            echo "::group::Running $nb"
            nbdir=$(dirname "$nb")
            if papermill --request-save-on-cell-execute --log-output \
                --cwd "$nbdir" "$nb" "$nb"; then
              echo "PASSED: $nb"
            else
              echo "::warning file=$nb::Notebook execution failed; restoring from HEAD and skipping"
              git checkout HEAD -- "$nb"
              failed_nbs+=("$nb")
            fi
            echo "::endgroup::"
          done
          {
            echo "failed_count=${#failed_nbs[@]}"
            echo "failed_notebooks<<FAILED_NB_EOF"
            for nb in "${failed_nbs[@]}"; do echo "- \`$nb\`"; done
            echo "FAILED_NB_EOF"
          } >> "$GITHUB_OUTPUT"
          if [ "${#failed_nbs[@]}" -gt 0 ]; then
            echo "::warning::${#failed_nbs[@]} notebook(s) failed execution and were not updated:"
            for nb in "${failed_nbs[@]}"; do
              echo "::warning file=$nb::$nb"
            done
          fi
      - name: Check for notebook changes
        id: check-changes
        run: |
          if git diff --quiet -- doc/source/tutorials; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply pre-commit autofixes to changed notebooks
        # Run repo pre-commit hooks (trailing-whitespace, end-of-file-fixer, ...)
        # against the freshly re-rendered notebooks so the committed result matches
        # what `pre-commit` would enforce locally and the CI hook won't fail later.
        # Autofix-on-find leaves files modified and the hook exits non-zero — that's
        # expected, so swallow it; the staged content will reflect the fixed files.
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          pip install --quiet pre-commit
          git diff --name-only -- doc/source/tutorials \
            | grep -E '\.ipynb$' \
            | xargs --no-run-if-empty pre-commit run --files \
            || true
      - name: Claude diff analysis
        # Have Claude summarize the re-render diff so the PR body (and
        # the dry-run artifact / Actions step summary) tell the reviewer
        # at a glance whether anything substantive changed. Output is
        # written to /tmp/nb_analysis.md. Failure is non-fatal — we fall
        # back to a clear warning in the PR body and on the step summary.
        id: claude-analysis
        if: steps.check-changes.outputs.changed == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model sonnet
            --allowed-tools "Bash,Read,Write"
            --max-turns 40
          prompt: |
            You are reviewing an automated re-render of galpy's tutorial notebooks
            against the upstream `main` branch. The current working tree contains
            the new outputs; `HEAD` is the unchanged main. All edits live under
            `doc/source/tutorials/**/*.ipynb`.

            **Deliverable**: write `/tmp/nb_analysis.md` — a brief markdown summary
            that will be appended verbatim to the PR body so reviewers can decide
            at a glance whether the rerun is routine noise or needs attention.

            ## Method

            1. `pip install --quiet Pillow numpy` so PIL/numpy are available for
               decoding embedded images.

            2. List changed notebooks:
               `git diff --name-only HEAD -- 'doc/source/tutorials/**/*.ipynb'`.

            3. For each one, verify cell SOURCE is unchanged (only outputs should
               differ). Compare:
                   diff <(git show "HEAD:$f" | jq -r '.cells[] | (.source|join(""))') \
                        <(jq -r '.cells[] | (.source|join(""))' "$f")
               Loudly flag any source change — that would be unexpected and
               worth investigating.

            4. Classify remaining diffs.

               NOISE — ignore, do NOT list individually:
                 - papermill timestamps, durations, execution_counts
                 - memory addresses inside `<...object at 0x...>` repr strings
                 - Python kernel version metadata bumps
                 - papermill `input_path`/`output_path` switching between absolute
                   and relative paths
                 - image base64 bytes that decode to visually-identical pixels
                 - ≤1e-9 relative floating-point roundoff in printed numbers
                 - cache-hit prints like `"Loaded N stars from local cache: …"`
                 - jaxlib/CUDA stderr lines about no GPU
                 - a galpyWarning disappearing because Python's default warnings
                   filter deduplicates a second emission
                 - In `action_angle/staeckel.ipynb` and `action_angle/torus.ipynb`:
                   printed actions/frequencies/angles drifting at the ~1e-5
                   relative level, and corresponding scatter-plot point shifts
                   in those notebooks. The `actionAngleStaeckel` and
                   `actionAngleTorus` C extensions are not bitwise-reproducible
                   across CI runners (compiler/libm differences), and we
                   accept this as routine.
                 - Coordinated output shifts across cells in
                   `action_angle/staeckel.ipynb` (Gaia DR3 catalog) or
                   `orbits/examples.ipynb` (Dierickx 2010 thick-disk catalog)
                   when the data file itself changed. Those FITS files are
                   refreshed monthly by the `test-doc-notebooks.yml` workflow,
                   so a coordinated shift in those notebooks just reflects a
                   newer snapshot — note it as a one-liner ("Gaia DR3 cache
                   refreshed this cycle") instead of itemizing every diff.

               SUBSTANTIVE — list these:
                 - text output diffs with >1e-6 relative change in printed numbers
                 - image diffs where >1% of pixels differ by >2 channel steps
                   after PIL decode (treat ≤2-step diffs as compression noise)
                 - cells that gained or lost outputs (excluding the
                   warning-dedup case above)
                 - any cell-source change at all

            5. For images: extract each `image/png` from both versions via jq +
               base64, decode with PIL, convert to numpy array, compare.

            ## Output format

            Write to `/tmp/nb_analysis.md`, structured exactly like this — keep the
            top half under 250 words; everything else goes inside `<details>`:

            ```markdown
            ### Re-run diff summary

            **Verdict**: <one short sentence — e.g. "no substantive changes" or
            "N concerns flagged below">

            <if there are concerns, include this table; otherwise omit it>

            | Notebook | Cell | Change | Likely cause |
            |---|---|---|---|
            | … | … | … | … |

            <details><summary>Image comparison (X image pairs)</summary>

            - Byte-identical: …
            - Visually identical (sub-perceptual): …
            - Pixel-differing (>1%): … (list notebook + %)

            </details>

            <details><summary>Text output diffs (filtered)</summary>

            <bullet list of substantive text diffs, or "none beyond floating-point
            roundoff and unseeded MC samples (if any cells remain unseeded)">

            </details>
            ```

            Be concise. Do not narrate steps in the output — the reader wants
            findings, not your process.
      - name: Surface diff analysis to Actions step summary
        # Visible in the GitHub Actions UI for any run (dry-run or scheduled),
        # so dry-runs — which don't open a PR — still expose what Claude
        # found. On real runs the same content is also merged into the PR
        # body below.
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          if [ -s /tmp/nb_analysis.md ]; then
            cat /tmp/nb_analysis.md >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.claude-analysis.outcome }}" = "failure" ]; then
            {
              echo "## :warning: Claude diff analysis failed"
              echo ""
              echo "Most likely the \`CLAUDE_CODE_OAUTH_TOKEN\` repository secret has expired or been revoked."
              echo "Regenerate it locally with \`claude setup-token\` and update the secret at"
              echo "[Settings → Secrets and variables → Actions](${{ github.server_url }}/${{ github.repository }}/settings/secrets/actions)."
              echo ""
              echo "See the \`Claude diff analysis\` step log above for the exact error."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_Diff analysis was skipped (no relevant changes)._" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Stage analysis file for dry-run artifact
        # Copy /tmp/nb_analysis.md into the workspace so the next step can
        # include it without absolute-path warnings from upload-artifact.
        if: >-
          steps.check-changes.outputs.changed == 'true' &&
          (github.event_name == 'pull_request' ||
           (github.event_name == 'workflow_dispatch' && inputs.dry_run))
        run: |
          mkdir -p artifact-staging
          if [ -s /tmp/nb_analysis.md ]; then
            cp /tmp/nb_analysis.md artifact-staging/nb_analysis.md
          fi
      - name: Upload updated notebooks as artifact (dry run)
        # Bundles the re-rendered notebooks and (if produced) Claude's diff
        # analysis so a dry-run reviewer can download both.
        if: >-
          steps.check-changes.outputs.changed == 'true' &&
          (github.event_name == 'pull_request' ||
           (github.event_name == 'workflow_dispatch' && inputs.dry_run))
        uses: actions/upload-artifact@v7
        with:
          name: updated-doc-notebooks
          path: |
            doc/source/tutorials/**/*.ipynb
            artifact-staging/nb_analysis.md
          if-no-files-found: warn
      - name: Open pull request with updated notebooks
        if: >-
          steps.check-changes.outputs.changed == 'true' &&
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || !inputs.dry_run)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          date_tag=$(date -u +'%Y-%m-%d')
          branch="auto/update-doc-notebooks-${date_tag}-run-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          # Only stage notebook files. Other paths under doc/source/tutorials
          # (e.g. the pynbody gasoline_ahf snapshot, Gaia/Dierickx query caches)
          # are downloaded at runtime and must not end up in the PR.
          find doc/source/tutorials -name '*.ipynb' -print0 | xargs -0 git add --
          git commit -m "Update documentation notebook outputs (${date_tag})"
          git push --set-upstream origin "$branch"

          failed_count="${{ steps.execute-notebooks.outputs.failed_count }}"
          failed_list=$(cat <<'FAILED_LIST_EOF'
          ${{ steps.execute-notebooks.outputs.failed_notebooks }}
          FAILED_LIST_EOF
          )

          if [ "$failed_count" -gt 0 ]; then
            title="[auto] Update documentation notebook outputs (${date_tag}) — ${failed_count} notebook(s) failed"
            {
              echo "> [!WARNING]"
              echo "> **Partial update — ${failed_count} notebook(s) failed to execute and were NOT updated in this PR.**"
              echo ">"
              echo "> Their committed outputs are unchanged from \`main\`; investigate separately before relying on them. Common cause: transient upstream service outages (e.g. the Gaia archive returning HTTP 5xx)."
              echo ""
              echo "**Failed notebooks:**"
              echo ""
              echo "$failed_list"
              echo ""
              echo "---"
              echo ""
            } > pr_body.md
          else
            title="[auto] Update documentation notebook outputs (${date_tag})"
            : > pr_body.md
          fi
          {
            echo "Automated re-execution of the tutorial notebooks under \`doc/source/tutorials/\` against the current \`main\` branch, produced by the \`Update documentation notebooks\` workflow ([run \`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})) on ${date_tag}."
            echo ""
          } >> pr_body.md

          # Append the Claude-generated diff analysis. If the analysis step
          # failed (most commonly: expired CLAUDE_CODE_OAUTH_TOKEN), surface a
          # clear warning + remediation instead of a generic fallback so the
          # next person to look at the PR knows exactly what to do.
          if [ -s /tmp/nb_analysis.md ]; then
            cat /tmp/nb_analysis.md >> pr_body.md
          elif [ "${{ steps.claude-analysis.outcome }}" = "failure" ]; then
            {
              echo "> [!WARNING]"
              echo "> **Diff analysis step failed.** Most likely the \`CLAUDE_CODE_OAUTH_TOKEN\` repository secret has expired or been revoked. Regenerate it locally with \`claude setup-token\` and update it at [Settings → Secrets and variables → Actions](${{ github.server_url }}/${{ github.repository }}/settings/secrets/actions). See the [\`Claude diff analysis\` step log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the exact error."
              echo ""
              echo "_Review the rendered notebook diffs manually for this rerun._"
            } >> pr_body.md
          else
            echo "_Diff analysis was skipped — review the rendered notebook diffs manually._" >> pr_body.md
          fi

          gh pr create \
            --base main \
            --head "$branch" \
            --title "$title" \
            --body-file pr_body.md
